<!-- Quarto Book Focus Mode -->
<style>
/* ── Focus Mode button ── */
#book-focus-toggle {
  position: fixed;
  left: 1rem;
  bottom: 1rem;
  z-index: 9999;

  height: 44px;
  min-width: 44px;
  width: 44px;

  border-radius: 999px;
  border: 1px solid var(--bs-border-color);
  background: var(--bs-body-bg);
  color: var(--bs-body-color);

  display: inline-flex;
  align-items: center;
  justify-content: flex-start;

  overflow: hidden;
  white-space: nowrap;
  cursor: pointer;

  font-size: 0.95rem;
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
  padding: 0;

  transition: padding .22s ease, transform .15s ease, box-shadow .2s ease;
}

#book-focus-toggle:hover {
  width: auto;
  padding-right: .9rem;
  box-shadow: 0 3px 14px rgba(0,0,0,.25);
  transform: scale(1.03);
}

#book-focus-icon {
  width: 44px;
  height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  flex-shrink: 0;
}

#book-focus-label {
  opacity: 0;
  margin-left: .15rem;
  transition: opacity .18s ease;
}

#book-focus-toggle:hover #book-focus-label {
  opacity: 1;
}

/* ── Focus mode: hide Quarto book navigation ── */
body.book-focus-mode #quarto-sidebar,
body.book-focus-mode #quarto-margin-sidebar,
body.book-focus-mode nav#TOC {
  display: none !important;
}

body.book-focus-mode #quarto-content {
  display: block !important;
}

body.book-focus-mode main.content {
  max-width: var(--book-focus-content-width, 920px);
  margin-left: auto !important;
  margin-right: auto !important;
}

/* Reading comfort */
#quarto-document-content {
  line-height: 1.65;
  font-size: 1.03rem;
}

/* ── Presentation mode: hide all content except the overlay ── */
body.book-presentation-mode #quarto-document-content > *:not(#pres-slide-overlay) {
  display: none !important;
}

/* Ensure the cloned section inside the overlay is always visible,
   overriding any inline style or Quarto rule that might hide it */
#pres-slide-overlay > section {
  display: block !important;
}

/* ── Presentation indicator (bottom-right, visible only when active) ── */
#book-pres-indicator {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  z-index: 9999;

  display: none;
  align-items: center;
  gap: 0.3rem;
  padding: 0 0.65rem 0 0.5rem;
  height: 28px;

  border-radius: 999px;
  border: 1px solid var(--bs-border-color);
  background: var(--bs-body-bg);
  color: var(--bs-body-color);
  box-shadow: 0 2px 8px rgba(0,0,0,.15);

  font-size: 0.72rem;
  font-family: monospace;
  opacity: 0.75;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: none;
}

body.book-presentation-mode #book-pres-indicator {
  display: inline-flex;
}

#book-pres-icon {
  font-size: 0.6rem;
  opacity: 0.7;
}
</style>

<button id="book-focus-toggle" aria-label="Focus Mode" type="button">
  <span id="book-focus-icon" aria-hidden="true">⛶</span>
  <span id="book-focus-label">Focus Mode</span>
</button>

<div id="book-pres-indicator" aria-live="polite">
  <span id="book-pres-counter"></span>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* ── Focus Mode ── */
  var button = document.getElementById("book-focus-toggle");
  var icon   = document.getElementById("book-focus-icon");
  var label  = document.getElementById("book-focus-label");

  var hasBookSidebar = document.querySelector("#quarto-sidebar") !== null;
  if (!hasBookSidebar) {
    if (button) button.style.display = "none";
    return;
  }

  var storageKey = "quarto-book-focus-mode";

  function setFocusMode(enabled) {
    document.body.classList.toggle("book-focus-mode", enabled);
    if (enabled) {
      icon.textContent  = "☰";
      label.textContent = "TOC";
      button.setAttribute("aria-label", "Show TOC");
    } else {
      icon.textContent  = "⛶";
      label.textContent = "Focus Mode";
      button.setAttribute("aria-label", "Focus Mode");
    }
    try { window.localStorage.setItem(storageKey, enabled ? "1" : "0"); } catch (e) {}
  }

  var saved = "0";
  try { saved = window.localStorage.getItem(storageKey) || "0"; } catch (e) {}
  setFocusMode(saved === "1");

  button.addEventListener("click", function () {
    setFocusMode(!document.body.classList.contains("book-focus-mode"));
  });

  /* ── Presentation Mode ── */
  var counter     = document.getElementById("book-pres-counter");
  var contentRoot = document.getElementById("quarto-document-content");
  if (!contentRoot) return;

  // Collect all sections in document (DFS) order
  var slides = [];
  (function collect(el) {
    for (var i = 0; i < el.children.length; i++) {
      var child = el.children[i];
      if (child.matches('section[class*="level"]')) {
        slides.push(child);
        collect(child);
      }
    }
  })(contentRoot);

  var currentIdx = 0;
  var presActive  = false;
  var overlay     = null;

  function getOverlay() {
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "pres-slide-overlay";
      contentRoot.appendChild(overlay);
    }
    return overlay;
  }

  function showSlide(idx) {
    var ov      = getOverlay();
    var section = slides[idx];

    // Clone section; for level1, keep subsections — for deeper levels, strip them
    var clone = section.cloneNode(true);
    // Clear any inline display style Quarto may have set on the original section
    clone.style.removeProperty('display');
    if (!section.classList.contains('level1')) {
      var nested = clone.querySelectorAll('section[class*="level"]');
      for (var i = 0; i < nested.length; i++) nested[i].remove();
    }

    ov.innerHTML = "";
    ov.appendChild(clone);

    counter.textContent = (idx + 1) + " / " + slides.length;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function setPresentationMode(enabled) {
    if (enabled && slides.length === 0) return;
    presActive = enabled;
    document.body.classList.toggle("book-presentation-mode", enabled);
    if (enabled) {
      currentIdx = 0;
      showSlide(0);
    } else {
      if (overlay) overlay.innerHTML = "";
    }
  }

  document.addEventListener("keydown", function (e) {
    var tag = document.activeElement ? document.activeElement.tagName : "";
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" ||
        (document.activeElement && document.activeElement.isContentEditable)) return;

    if (e.key === "f" || e.key === "F") {
      e.preventDefault();
      setFocusMode(true);
      return;
    }

    if (e.key === "t" || e.key === "T") {
      e.preventDefault();
      setFocusMode(false);
      return;
    }

    if (e.key === "p" || e.key === "P") {
      e.preventDefault();
      setPresentationMode(!presActive);
      return;
    }

    if (!presActive || slides.length === 0) return;

    if (e.key === "PageDown") {
      e.preventDefault();
      if (currentIdx < slides.length - 1) showSlide(++currentIdx);
    } else if (e.key === "PageUp") {
      e.preventDefault();
      if (currentIdx > 0) showSlide(--currentIdx);
    }
  });

});
</script>
